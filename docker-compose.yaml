services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doctor-prescription-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      CORS_ENABLED: 'true'
      CORS_ORIGINS: '*'
      TRUST_PROXY: 'false'
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 120
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 365d
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/doctor_prescription?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: info
      HTTP_LOG_LEVEL: info
    ports:
      - '4000:4000'
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: doctor-prescription-postgres
    environment:
      POSTGRES_DB: doctor_prescription
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d doctor_prescription']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: doctor-prescription-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
